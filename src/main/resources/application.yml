server:
  port: 8080

spring:
  application:
    name: nexusdoc
  servlet:
    multipart:
      max-file-size: ${NEXUSDOC_FILE_MCP_MAX_FILE_SIZE:10MB}
      max-request-size: ${NEXUSDOC_FILE_MCP_MAX_REQUEST_SIZE:12MB}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/nexusdoc?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

siliconflow:
  api-key: ${SILICONFLOW_API_KEY:}
  base-url: ${SILICONFLOW_BASE_URL:https://api.xcode.best/v1/chat/completions/v1}
  model: ${SILICONFLOW_MODEL:gpt-5.4}
  temperature: 0.4
  max-tokens: 4096
  stream: false

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/chat/completions}
  model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
  temperature: 0.4
  max-tokens: 4096
  stream: false

web-search:
  enabled: true
  provider: serpapi
  api-key: ${SERPAPI_API_KEY:}
  base-url: ${SERPAPI_BASE_URL:https://serpapi.com/search}
  engine: ${SERPAPI_ENGINE:google}
  hl: ${SERPAPI_HL:zh-cn}
  gl: ${SERPAPI_GL:cn}
  num: 5
  timeout-seconds: 10
  cache-ttl-seconds: 600

nexusdoc:
  file-mcp:
    enabled: ${NEXUSDOC_FILE_MCP_ENABLED:true}
    max-file-size-mb: ${NEXUSDOC_FILE_MCP_MAX_FILE_SIZE_MB:10}
    max-extract-chars: ${NEXUSDOC_FILE_MCP_MAX_EXTRACT_CHARS:20000}
    max-pdf-pages: ${NEXUSDOC_FILE_MCP_MAX_PDF_PAGES:80}
    supported-types:
      - txt
      - md
      - markdown
      - csv
      - json
      - docx
      - pdf
